model:
  base_learning_rate: 4.5e-06
  target: ldm.models.dpt_vqgan.DPTVQGAN
  params:
    embed_dim: 1
    n_embed: 16384
    m_dim: 64
    num_phases: 9  # 相位总数（XCAT=9帧，肝脏=4帧）
    monitor: val/rec_loss
    # 解耦损失权重
    w_anat: 2.0
    w_swap: 5.0
    w_phase: 5.0
    # 相位对比损失权重（直接加到 AE 和 motion optimizer）
    w_phase_contrastive: 1.0
    # VQ 参数（与原 VQModel 兼容）
    ddconfig:
      double_z: false
      z_channels: 1
      resolution: 256
      in_channels: 1
      out_ch: 1
      ch: 128
      ch_mult:
      - 1
      - 2
      - 4
      num_res_blocks: 2
      attn_resolutions: [32]
      dropout: 0.0
    # GAN 损失（与原 VQModel 兼容）
    lossconfig:
      target: taming.modules.losses.vqperceptual.VQLPIPSWithDiscriminator
      params:
        disc_conditional: false
        disc_in_channels: 1
        disc_start: 99999   # 初期关闭 GAN，99999 等效于不训练 disc
        disc_weight: 0.75
        codebook_weight: 1.0
        perceptual_weight: 1.0

data:
  target: main.DataModuleFromConfig
  params:
    batch_size: 1        # batch_size = 每 batch 的被试数；decode 用 grad_checkpoint 降显存
    num_workers: 4
    wrap: true
    collate_fn: ldm.data.xcat_seq_grouped.xcat_seq_grouped_collate_fn
    train:
      target: ldm.data.xcat_seq_grouped.XCATSeqGroupedTrain
      params: {}
    validation:
      target: ldm.data.xcat_seq_grouped.XCATSeqGroupedValidation
      params: {}
    test:
      target: ldm.data.xcat_seq_grouped.XCATSeqGroupedTest
      params: {}

lightning:
  callbacks:
    image_logger:
      target: main.ImageLogger
      params:
        batch_frequency: 200
        max_images: 8
        rescale: false
        increase_log_steps: false
  trainer:
    benchmark: true
    accumulate_grad_batches: 1
    max_epochs: 50
    default_root_dir: ./logs/xcat-dpt-vqgan
    val_check_interval: 1.0
    gpus: 1
    precision: 16 
